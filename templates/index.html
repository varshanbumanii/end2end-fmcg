<!DOCTYPE html>
<html>
<head>
<title>FMCG Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f3f4f6;
}

/* HEADER */
.header {
    padding: 20px;
}

.header h1 {
    margin: 0;
}

.header p {
    color: gray;
}

/* KPI */
.kpi-row {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.kpi {
    background: white;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
}

.kpi h2 {
    margin: 0;
}

.kpi p {
    color: green;
}

/* FILTERS */
.filters {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* NAV */
.navbar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px;
}

button {
    background: orange;
    color: white;
    border: none;
    padding: 8px 16px;
}

/* SECTION */
.section { display: none; }
.active { display: block; }

</style>
</head>

<body>

<div class="navbar">
    <button onclick="showSection('primary')">Primary</button>
    <button onclick="showSection('secondary')">Secondary</button>
</div>

<div class="filters">
    <input type="date" id="start">
    <input type="date" id="end">
    <select id="region">
        <option value="">All Regions</option>
        <option>North</option>
        <option>South</option>
    </select>
    <select id="category">
        <option value="">All Categories</option>
        <option>Beverages</option>
        <option>Snacks</option>
    </select>
    <button onclick="loadAll()">Apply</button>
</div>

<!-- PRIMARY -->
<div id="primary" class="section active">

<div class="header">
<h1>Sales Dashboard</h1>
<p>Key performance indicators for FMCG business</p>
</div>

<div class="kpi-row">
<div class="kpi"><h2 id="rev"></h2><p>Total Revenue</p></div>
<div class="kpi"><h2 id="ord"></h2><p>Total Orders</p></div>
<div class="kpi"><h2 id="aov"></h2><p>Average Order Value</p></div>
<div class="kpi"><h2 id="cust"></h2><p>Total Customers</p></div>
</div>

<div class="grid">
<div class="card">
<h3>Revenue Trend</h3>
<canvas id="trend"></canvas>
</div>

<div class="card">
<h3>Revenue by Category</h3>
<canvas id="categoryChart"></canvas>
</div>

<div class="card">
<h3>Sales by Region</h3>
<canvas id="regionChart"></canvas>
</div>
</div>

</div>

<!-- SECONDARY -->
<div id="secondary" class="section">

<div class="header">
<h1>Deep Dive Analysis</h1>
<p>Product, customer and channel insights</p>
</div>

<div class="grid">
<div class="card">
<h3>Top Products</h3>
<canvas id="productChart"></canvas>
</div>

<div class="card">
<h3>Top Customers</h3>
<canvas id="customerChart"></canvas>
</div>

<div class="card">
<h3>Sales by Channel</h3>
<canvas id="channelChart"></canvas>
</div>
</div>

</div>

<script>

let charts = {};

// FORMAT FUNCTION
function formatNumber(num){
    if(num >= 1000000) return (num/1000000).toFixed(1) + "M";
    if(num >= 1000) return (num/1000).toFixed(1) + "K";
    return num;
}

// NAV
function showSection(s){
    document.querySelectorAll('.section').forEach(d=>d.classList.remove('active'));
    document.getElementById(s).classList.add('active');
}

// FILTERS
function getFilters(){
    return {
        start: start.value,
        end: end.value,
        region: region.value,
        category: category.value
    }
}

// RESET CHART
function resetChart(id){
    if(charts[id]) charts[id].destroy();
}

// KPI
async function loadKPIs(){
    const d = await (await fetch('/kpis')).json();
    rev.innerText = "₹" + formatNumber(d.total_revenue);
    ord.innerText = formatNumber(d.total_orders);
    aov.innerText = "₹" + formatNumber(d.aov);
    cust.innerText = formatNumber(d.total_customers);
}

// TREND
async function loadTrend(){
    resetChart("trend");
    const f = getFilters();
    const data = await (await fetch(`/sales?start=${f.start}&end=${f.end}`)).json();

    charts["trend"] = new Chart(trend,{
        type:'line',
        data:{
            labels:data.map(d=>d.order_date),
            datasets:[{
                label:"Revenue",
                data:data.map(d=>d.total_revenue),
                borderColor:"#3b82f6"
            }]
        }
    });
}

// CATEGORY
async function loadCategory(){
    resetChart("categoryChart");
    const f = getFilters();
    const data = await (await fetch(`/products?category=${f.category}`)).json();

    let map={};
    data.forEach(d=>map[d.category]=(map[d.category]||0)+d.total_revenue);

    charts["categoryChart"] = new Chart(categoryChart,{
        type:'bar',
        data:{
            labels:Object.keys(map),
            datasets:[{
                label:"Revenue",
                data:Object.values(map),
                backgroundColor:"#3b82f6"
            }]
        }
    });
}

// REGION
async function loadRegion(){
    resetChart("regionChart");
    const f = getFilters();
    const data = await (await fetch(`/customers?region=${f.region}`)).json();

    let map={};
    data.forEach(d=>map[d.region]=(map[d.region]||0)+d.total_revenue);

    charts["regionChart"] = new Chart(regionChart,{
        type:'bar',
        data:{
            labels:Object.keys(map),
            datasets:[{
                label:"Revenue",
                data:Object.values(map),
                backgroundColor:"#3b82f6"
            }]
        }
    });
}

// PRODUCTS
async function loadProducts(){
    resetChart("productChart");
    const data = await (await fetch('/products')).json();

    const top = data.slice(0,5);

    charts["productChart"] = new Chart(productChart,{
        type:'bar',
        data:{
            labels:top.map(d=>d.product_name),
            datasets:[{
                label:"Revenue",
                data:top.map(d=>d.total_revenue),
                backgroundColor:"#10b981"
            }]
        }
    });
}

// CUSTOMERS
async function loadCustomers(){
    resetChart("customerChart");
    const data = await (await fetch('/customers')).json();

    const top = data.slice(0,5);

    charts["customerChart"] = new Chart(customerChart,{
        type:'bar',
        data:{
            labels:top.map(d=>d.name),
            datasets:[{
                label:"Revenue",
                data:top.map(d=>d.total_revenue),
                backgroundColor:"#f97316"
            }]
        }
    });
}

// CHANNEL
async function loadChannel(){
    resetChart("channelChart");
    const data = await (await fetch('/customers')).json();

    let map={};
    data.forEach(d=>map[d.channel]=(map[d.channel]||0)+d.total_revenue);

    charts["channelChart"] = new Chart(channelChart,{
        type:'pie',
        data:{
            labels:Object.keys(map),
            datasets:[{data:Object.values(map)}]
        }
    });
}

// LOAD ALL
function loadAll(){
    loadKPIs();
    loadTrend();
    loadCategory();
    loadRegion();
    loadProducts();
    loadCustomers();
    loadChannel();
}

loadAll();

</script>

</body>
</html>
