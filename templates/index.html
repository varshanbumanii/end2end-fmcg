<!DOCTYPE html>
<html>
<head>
<title>FMCG Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* COLOR PALETTE */
:root{
    --primary:#3f51b5;
    --secondary:#5c6bc0;
    --accent:#e8b87c;
    --highlight:#ee8f3b;
    --bg:#f5f6fa;
    --card:#ffffff;
}

/* GLOBAL */
body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
}

.header h1{
    margin:0;
    font-size:24px;
}

.header p{
    color:gray;
    margin-top:5px;
}

/* NAVBAR */
.navbar{
    display:flex;
    gap:10px;
    padding:0 30px 10px;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:var(--secondary);
}

/* FILTERS */
.filters{
    display:flex;
    gap:10px;
    padding:10px 30px;
}

.filters input, .filters select{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

/* KPI CARDS */
.kpi-row{
    display:flex;
    gap:20px;
    padding:20px 30px;
}

.kpi{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    flex:1;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.kpi h2{
    margin:0;
    font-size:22px;
}

.kpi p{
    color:gray;
    margin-top:5px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px 30px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* SECTIONS */
.section{ display:none; }
.active{ display:block; }

</style>
</head>

<body>

<div class="header">
<div>
<h1>Sales Dashboard</h1>
<p>Key performance indicators</p>
</div>
</div>

<div class="navbar">
<button onclick="showSection('primary')">Primary</button>
<button onclick="showSection('secondary')">Secondary</button>
</div>

<div class="filters">
<input type="date" id="start">
<input type="date" id="end">
<select id="region"></select>
<select id="category"></select>
<button onclick="loadAll()">Apply</button>
</div>

<!-- PRIMARY -->
<div id="primary" class="section active">

<div class="kpi-row">
<div class="kpi"><h2 id="rev"></h2><p>Total Revenue</p></div>
<div class="kpi"><h2 id="ord"></h2><p>Total Orders</p></div>
<div class="kpi"><h2 id="aov"></h2><p>Average Order Value</p></div>
<div class="kpi"><h2 id="cust"></h2><p>Total Customers</p></div>
</div>

<div class="grid">
<div class="card"><h3>Monthly Revenue</h3><canvas id="trend"></canvas></div>
<div class="card"><h3>Revenue by Category</h3><canvas id="categoryChart"></canvas></div>
<div class="card"><h3>Sales by Region</h3><canvas id="regionChart"></canvas></div>
</div>

</div>

<!-- SECONDARY -->
<div id="secondary" class="section">

<div class="grid">
<div class="card"><h3>Top Products</h3><canvas id="productChart"></canvas></div>
<div class="card"><h3>Top Customers</h3><canvas id="customerChart"></canvas></div>
<div class="card"><h3>Channel Split</h3><canvas id="channelChart"></canvas></div>
</div>

</div>

<script>

/* SAME JS — NO LOGIC CHANGE */

let charts = {};

function formatNumber(num){
    if(num >= 1000000) return (num/1000000).toFixed(1)+"M";
    if(num >= 1000) return (num/1000).toFixed(1)+"K";
    return num;
}

function showSection(s){
    document.querySelectorAll('.section').forEach(d=>d.classList.remove('active'));
    document.getElementById(s).classList.add('active');
}

function getFilters(){
    return { start:start.value, end:end.value, region:region.value, category:category.value }
}

async function loadFilters(){
    const d = await (await fetch('/filters')).json();

    region.innerHTML = `<option value="">All Regions</option>`;
    d.regions.forEach(r=> region.innerHTML += `<option>${r}</option>`);

    category.innerHTML = `<option value="">All Categories</option>`;
    d.categories.forEach(c=> category.innerHTML += `<option>${c}</option>`);
}

function resetChart(id){
    if(charts[id]) charts[id].destroy();
}

/* KPI */
async function loadKPIs(){
    const f = getFilters();
    const d = await (await fetch(`/kpis?start=${f.start}&end=${f.end}&region=${f.region}&category=${f.category}`)).json();

    rev.innerText = "₹"+formatNumber(d.total_revenue);
    ord.innerText = formatNumber(d.total_orders);
    aov.innerText = "₹"+formatNumber(d.aov);
    cust.innerText = formatNumber(d.total_customers);
}

/* MONTHLY */
async function loadTrend(){
    resetChart("trend");
    const f = getFilters();
    const data = await (await fetch(`/sales?start=${f.start}&end=${f.end}`)).json();

    let map={};
    data.forEach(d=>{
        if(!d.order_date) return;
        const m = d.order_date.slice(0,7);
        map[m]=(map[m]||0)+d.total_revenue;
    });

    charts["trend"] = new Chart(trend,{
        type:'bar',
        data:{
            labels:Object.keys(map),
            datasets:[{
                label:"Revenue",
                data:Object.values(map),
                backgroundColor:"#3f51b5"
            }]
        }
    });
}

/* CATEGORY */
async function loadCategory(){
    resetChart("categoryChart");
    const f = getFilters();
    const data = await (await fetch(`/products?category=${f.category}`)).json();

    let map={};
    data.forEach(d=>{
        if(d.category)
            map[d.category]=(map[d.category]||0)+d.total_revenue;
    });

    charts["categoryChart"] = new Chart(categoryChart,{
        type:'bar',
        data:{
            labels:Object.keys(map),
            datasets:[{
                label:"Revenue",
                data:Object.values(map),
                backgroundColor:"#ee8f3b"
            }]
        }
    });
}

/* REGION */
async function loadRegion(){
    resetChart("regionChart");
    const f = getFilters();
    const data = await (await fetch(`/customers?region=${f.region}`)).json();

    let map={};
    data.forEach(d=>{
        if(d.region)
            map[d.region]=(map[d.region]||0)+d.total_revenue;
    });

    charts["regionChart"] = new Chart(regionChart,{
        type:'bar',
        data:{
            labels:Object.keys(map),
            datasets:[{
                label:"Revenue",
                data:Object.values(map),
                backgroundColor:"#5c6bc0"
            }]
        }
    });
}

async function loadProducts(){
    resetChart("productChart");
    const data = await (await fetch('/products')).json();
    const top = data.slice(0,5);

    charts["productChart"] = new Chart(productChart,{
        type:'bar',
        data:{labels:top.map(d=>d.product_name),datasets:[{data:top.map(d=>d.total_revenue)}]}
    });
}

async function loadCustomers(){
    resetChart("customerChart");
    const data = await (await fetch('/customers')).json();
    const top = data.slice(0,5);

    charts["customerChart"] = new Chart(customerChart,{
        type:'bar',
        data:{labels:top.map(d=>d.name),datasets:[{data:top.map(d=>d.total_revenue)}]}
    });
}

async function loadChannel(){
    resetChart("channelChart");
    const data = await (await fetch('/customers')).json();

    let map={};
    data.forEach(d=>{
        if(d.channel)
            map[d.channel]=(map[d.channel]||0)+d.total_revenue;
    });

    charts["channelChart"] = new Chart(channelChart,{
        type:'pie',
        data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}
    });
}

function loadAll(){
    loadKPIs();
    loadTrend();
    loadCategory();
    loadRegion();
    loadProducts();
    loadCustomers();
    loadChannel();
}

loadFilters().then(loadAll);

</script>

</body>
</html>
